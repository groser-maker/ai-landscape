<style>

    --navy-mid: #162a50;

    --navy-border: #243d6e;
    --accent: #0ea5e9;
    --accent-glow: rgba(14,165,233,0.15);
    --text: #e8edf5;
    --text-muted: #8da0bf;
    --text-dim: #5a7099;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #a855f7;
    --teal: #14b8a6;
    --indigo: #6366f1;
    --orange: #f97316;
    --badge-se: #0ea5e9;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--navy);
    color: var(--text);

    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; opacity: 0.85; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy-mid) 100%);
    border-bottom: 1px solid var(--navy-border);
    padding: 28px 32px 24px;
  }
  .header-inner { max-width: 1700px; margin: 0 auto; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--accent); }
  .header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 500;
  }
  .header-badge {
    background: var(--accent-glow);
    border: 1px solid rgba(14,165,233,0.3);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  /* Summary cards */
  .summary-row {
    max-width: 1700px;
    margin: 24px auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 10px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 10px 10px 0 0;
  }
  .card.blue::before  { background: var(--accent); }
  .card.purple::before { background: var(--purple); }
  .card.teal::before  { background: var(--teal); }
  .card.green::before { background: var(--green); }
  .card.amber::before { background: var(--amber); }
  .card.indigo::before { background: var(--indigo); }
  .card-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-value { font-size: 28px; font-weight: 800; color: #fff; margin-top: 4px; line-height: 1; }
  .card-value.sm { font-size: 20px; }
  .card-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* Controls */
  .controls {
    max-width: 1700px;
    margin: 0 auto 16px;
    padding: 0 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 240px; max-width: 380px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; width: 14px; height: 14px; }
  #searchInput {
    width: 100%;
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 7px;
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text-dim); }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: rgba(14,165,233,0.08); border-color: rgba(14,165,233,0.3); color: var(--text); }
  .filter-btn.active { background: var(--accent-glow); border-color: rgba(14,165,233,0.4); color: var(--accent); }
  .results-count { margin-left: auto; font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  /* Table wrapper */
  .table-wrap { max-width: 1700px; margin: 0 auto; padding: 0 32px 48px; }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 10px;
    overflow: hidden;

  th.sorted-desc::after { content: ' \2193'; color: var(--accent); }

  tbody tr.detail-row > td { border-bottom: 1px solid rgba(36,61,110,0.5); padding: 0; }
  tbody tr.data-row:last-of-type > td { border-bottom: none; }

  .snippet-item {

    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;

  .snippet-field {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 3px;

    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 5px;
    margin-bottom: 3px;
    font-size: 12px;
    transition: background 0.1s;

  /* Section divider */

  .divider-line  { flex: 1; height: 1px; background: var(--navy-border); }
</style>

// ── RECENCY ───────────────────────────────────────────────────────────────────
const TODAY    = '2026-06-30';
const CUTOFF   = '2026-06-16'; // 14 days before today

function parseDate(s) {
  if (!s) return null;
  let m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[0];
  m = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    const a = parseInt(m[1]), b = parseInt(m[2]), yr = m[3];
    if (a > 12) return yr + '-' + String(b).padStart(2,'0') + '-' + String(a).padStart(2,'0');
    return yr + '-' + String(a).padStart(2,'0') + '-' + String(b).padStart(2,'0');
  }
  m = s.match(/\b(\d{1,2})\.(\d{1,2})\.\b/);
  if (m) return '2026-' + String(parseInt(m[2])).padStart(2,'0') + '-' + String(parseInt(m[1])).padStart(2,'0');
  return null;
}

function extractDatesFromText(text) {
  if (!text) return [];
  const dates = [];
  const isoRx = /\b(\d{4}-\d{2}-\d{2})\b/g;
  let m;
  while ((m = isoRx.exec(text)) !== null) dates.push(m[1]);
  const dmyRx = /\b(\d{1,2})\/(\d{1,2})\/(\d{4})\b/g;
  while ((m = dmyRx.exec(text)) !== null) { const d = parseDate(m[0]); if (d) dates.push(d); }
  const finRx = /\b(\d{1,2})\.(\d{1,2})\.\b/g;
  while ((m = finRx.exec(text)) !== null) { const d = parseDate(m[0]); if (d) dates.push(d); }
  return dates;
}

function isRecent(dateStr) {
  if (!dateStr) return false;
  return dateStr >= CUTOFF && dateStr <= TODAY;
}

function getRecency(o) {
  let hasRecentSE = false, hasRecentTask = false, hasRecentEvent = false;
  let allDates = [];
  Object.values(o.snippets).forEach(function(text) {
    var dates = extractDatesFromText(text);
    dates.forEach(function(d) { if (isRecent(d)) hasRecentSE = true; allDates.push(d); });
  });
  o.tasks.forEach(function(t) {
    if (isRecent(t.date)) hasRecentTask = true;
    if (t.date) allDates.push(t.date);
  });
  o.events.forEach(function(e) {
    if (isRecent(e.date)) hasRecentEvent = true;
    if (e.date) allDates.push(e.date);
  });
  allDates = allDates.filter(Boolean).sort().reverse();
  return {
    hasRecentSE: hasRecentSE,
    hasRecentTask: hasRecentTask,
    hasRecentEvent: hasRecentEvent,
    hasAnyRecent: hasRecentSE || hasRecentTask || hasRecentEvent,
    lastDate: allDates[0] || null
  };
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function stageNum(s) {
  if (!s) return -1;
  const m = s.match(/^0?(\d)/);
  return m ? parseInt(m[1]) : -1;
}

function fmtACV(v) {
  if (v == null) return '<span class="acv-none">—</span>';
  return '<span class="acv-val">$' + Math.round(v).toLocaleString('en-US') + '</span>';
}

function stageBadge(s) {
  if (!s) return '<span class="stage-badge sna">—</span>';
  const n = stageNum(s);
  const cls = (n >= 1 && n <= 6) ? 's0' + n : 'sna';
  return '<span class="stage-badge ' + cls + '">' + s.replace(/^0/, '') + '</span>';
}

function regionChip(r) {
  const cls = { AMER:'r-amer', EMEA:'r-emea', APAC:'r-apac' }[r] || 'r-amer';
  return '<span class="region-chip ' + cls + '">' + r + '</span>';
}

function evidenceBadges(o) {
  const rec = getRecency(o);
  let b = '';
  if (o.hasSE)    b += '<span class="badge badge-se">'    + (rec.hasRecentSE    ? '<span class="recent-dot"></span>' : '') + 'SE Comments</span>';
  if (o.hasTask)  b += '<span class="badge badge-task">'  + (rec.hasRecentTask  ? '<span class="recent-dot"></span>' : '') + 'Task</span>';
  if (o.hasEvent) b += '<span class="badge badge-event">' + (rec.hasRecentEvent ? '<span class="recent-dot"></span>' : '') + 'Event</span>';
  return b || '<span style="color:var(--text-dim);font-size:11px;">—</span>';
}

function activityTypeBadge(t) {
  if (!t) return '';
  if (t === 'Customer Presentation' || t === 'On-Site') return '<span class="activity-type type-pres">' + t + '</span>';
  if (t === 'Dry Run') return '<span class="activity-type type-dry">' + t + '</span>';
  return '<span class="activity-type type-other">' + t + '</span>';
}

function getMostRecent(o) {
  let all = [];
  o.events.forEach(e => all.push({ date: e.date, desc: e.subj, src: 'event' }));
  o.tasks.forEach(t => all.push({ date: t.date, desc: t.subj, src: 'task' }));
  if (!all.length) return null;
  all.sort((a, b) => b.date.localeCompare(a.date));
  return all[0];
}

function trunc(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

// ── STATE ─────────────────────────────────────────────────────────────────────
let sortCol = null, sortDir = -1;
let activeFilter = 'all';
let searchQ = '';

// ── RENDER SUMMARY ────────────────────────────────────────────────────────────
function renderSummary() {
  const total = OPPS.length;
  const seCount = OPPS.filter(o => o.hasSE).length;
  const taskCount = OPPS.filter(o => o.hasTask).length;
  const eventCount = OPPS.filter(o => o.hasEvent).length;
  const amer = OPPS.filter(o => o.region === 'AMER').length;
  const emea = OPPS.filter(o => o.region === 'EMEA').length;
  const apac = OPPS.filter(o => o.region === 'APAC').length;
  const totalACV = OPPS.filter(o => o.acv).reduce((s, o) => s + o.acv, 0);
  document.getElementById('summaryRow').innerHTML =
    card('blue',   total,          'Total Opps',      'with demo evidence') +
    card('blue',   '$' + (totalACV/1e6).toFixed(1) + 'M', 'Total ACV', 'where amount known', true) +
    card('blue',   seCount,        'SE Comments',     'opp text field match') +
    card('purple', taskCount,      'Tasks',           '"demo" in subject') +
    card('teal',   eventCount,     'Events',          '"demo" in subject') +
    card('green',  amer,           'AMER',            'opportunities') +
    card('indigo', emea,           'EMEA',            'opportunities') +
    card('amber',  apac,           'APAC',            'opportunities');
}
function card(color, val, label, sub, sm) {
  return '<div class="card ' + color + '">' +
    '<div class="card-label">' + label + '</div>' +
    '<div class="card-value' + (sm ? ' sm' : '') + '">' + val + '</div>' +
    '<div class="card-sub">' + sub + '</div>' +
    '</div>';
}

// ── FILTER & SORT ─────────────────────────────────────────────────────────────
function getFiltered() {
  let d = OPPS.slice();
  if (activeFilter === 'se')    d = d.filter(o => o.hasSE);
  else if (activeFilter === 'task')  d = d.filter(o => o.hasTask);
  else if (activeFilter === 'event') d = d.filter(o => o.hasEvent);
  else if (activeFilter === 'AMER')  d = d.filter(o => o.region === 'AMER');
  else if (activeFilter === 'EMEA')  d = d.filter(o => o.region === 'EMEA');
  else if (activeFilter === 'APAC')  d = d.filter(o => o.region === 'APAC');
  else if (activeFilter === 'recent14d') d = d.filter(function(o) { return getRecency(o).hasAnyRecent; });

  if (searchQ) {
    const q = searchQ.toLowerCase();
    d = d.filter(o =>
      o.acct.toLowerCase().includes(q) ||
      o.opp.toLowerCase().includes(q) ||
      o.owner.toLowerCase().includes(q) ||
      o.region.toLowerCase().includes(q) ||
      Object.values(o.snippets).some(s => s.toLowerCase().includes(q))
    );
  }
  return doSort(d);
}

function doSort(d) {
  if (!sortCol) {
    return d.sort((a, b) => {
      const diff = stageNum(b.stage) - stageNum(a.stage);
      if (diff !== 0) return diff;
      return (b.acv || 0) - (a.acv || 0);
    });
  }
  return d.sort((a, b) => {
    let va, vb;
    if (sortCol === 'account') { va = a.acct.toLowerCase(); vb = b.acct.toLowerCase(); }
    else if (sortCol === 'opp') { va = a.opp.toLowerCase(); vb = b.opp.toLowerCase(); }
    else if (sortCol === 'stage') { va = stageNum(a.stage); vb = stageNum(b.stage); }
    else if (sortCol === 'acv')   { va = a.acv || 0; vb = b.acv || 0; }
    else if (sortCol === 'owner') { va = a.owner.toLowerCase(); vb = b.owner.toLowerCase(); }
    else if (sortCol === 'recent') {
      const ra = getMostRecent(a), rb = getMostRecent(b);
      va = ra ? ra.date : '0000'; vb = rb ? rb.date : '0000';
    }
    else { return 0; }
    if (va < vb) return -sortDir;
    if (va > vb) return  sortDir;
    return 0;
  });
}

// ── RENDER DETAIL ─────────────────────────────────────────────────────────────
function renderDetail(o) {
  const hasS = Object.keys(o.snippets).length > 0;
  const hasA = o.tasks.length + o.events.length > 0;
  if (!hasS && !hasA) return '<div style="color:var(--text-dim);font-size:12px;padding:4px 0;">No additional detail available.</div>';

  let sHtml = '';
  if (hasS) {
    sHtml = '<div class="detail-section"><h4><span class="dot" style="background:var(--badge-se)"></span>SE Field Notes</h4>' +
      Object.entries(o.snippets).map(([f, t]) =>
        '<div class="snippet-item"><div class="snippet-field">' + f + '</div><div>' + t + '</div></div>'
      ).join('') + '</div>';
  }

  let aHtml = '';
  if (hasA) {
    const all = [
      ...o.events.map(e => ({ ...e, src: 'event' })),
      ...o.tasks.map(t => ({ ...t, src: 'task' }))
    ].sort((a, b) => b.date.localeCompare(a.date));
    aHtml = '<div class="detail-section"><h4><span class="dot" style="background:var(--badge-event)"></span>Demo Tasks &amp; Events</h4>' +
      all.map(function(a) {
        const hot = isRecent(a.date);
        return '<div class="activity-item' + (hot ? ' activity-recent' : '') + '">' +
        '<div class="activity-date" style="' + (hot ? 'color:var(--green);font-weight:700' : '') + '">' + a.date + (hot ? ' <span class="badge-recent-inline">14d</span>' : '') + '</div>' +
        '<div class="activity-subject">' + a.subj + '</div>' +
        '<span class="activity-src src-' + a.src + '">' + (a.src === 'event' ? 'Event' : 'Task') + '</span>' +
        activityTypeBadge(a.type) +
        '</div>';
      }).join('') + '</div>';
  }

  if (sHtml && aHtml) return '<div class="detail-grid">' + sHtml + aHtml + '</div>';
  return sHtml + aHtml;
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function renderTable() {
  const filtered = getFiltered();
  document.getElementById('resultsCount').textContent = filtered.length + ' of ' + OPPS.length + ' opportunities';

  if (!filtered.length) {
    document.getElementById('tableBody').innerHTML = '';
    document.getElementById('noResults').style.display = 'block';
    return;
  }
  document.getElementById('noResults').style.display = 'none';

  const rows = filtered.map((o, i) => {
    const recent = getMostRecent(o);
    const rec = getRecency(o);
    let recentCell = '';
    if (recent) {
      const dateColor = isRecent(recent.date) ? 'var(--green)' : 'var(--text)';
      const recentTag = isRecent(recent.date) ? ' <span class="badge-recent-inline">NEW</span>' : '';
      recentCell = '<div style="font-size:12px;font-weight:600;color:' + dateColor + '">' + recent.date + recentTag + '</div>' +
        '<div style="font-size:11px;color:var(--text-muted);margin-top:2px">' + trunc(recent.desc, 58) + '</div>';
    } else if (Object.keys(o.snippets).length) {
      const snipText = Object.values(o.snippets)[0];
      const snipDates = extractDatesFromText(snipText).sort().reverse();
      const snipRecent = snipDates.length && isRecent(snipDates[0]);
      const recentTag = snipRecent ? ' <span class="badge-recent-inline">NEW</span>' : '';
      recentCell = '<div style="font-size:11px;color:' + (snipRecent ? 'var(--green)' : 'var(--text-muted)') + '">' + trunc(snipText, 58) + recentTag + '</div>';
    } else {
      recentCell = '<span style="color:var(--text-dim);font-size:11px">—</span>';
    }

    const hasDetail = Object.keys(o.snippets).length + o.tasks.length + o.events.length > 0;
    const orgUrl = 'https://org62.lightning.force.com/lightning/r/Opportunity/' + o.id + '/view';

    return '<tr class="data-row" data-i="' + i + '" onclick="toggleRow(' + i + ',this)">' +
      '<td style="padding:8px 8px 8px 16px">' +
        (hasDetail ? '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>' : '') +
      '</td>' +
      '<td><div class="acct-name">' + o.acct + '</div>' + regionChip(o.region) + '</td>' +
      '<td><a class="opp-link" href="' + orgUrl + '" target="_blank" onclick="event.stopPropagation()">' + trunc(o.opp, 68) + '</a></td>' +
      '<td>' + stageBadge(o.stage) + '</td>' +
      '<td style="text-align:right">' + fmtACV(o.acv) + '</td>' +
      '<td>' + evidenceBadges(o) + '</td>' +
      '<td>' + recentCell + '</td>' +
      '<td style="color:var(--text-muted);font-size:12px">' + (o.owner || '—') + '</td>' +
      '</tr>' +
      '<tr class="detail-row" id="dr-' + i + '">' +
        '<td colspan="8" style="padding:0;border-bottom:1px solid rgba(36,61,110,0.5)">' +
          '<div class="detail-panel" id="dp-' + i + '">' + renderDetail(o) + '</div>' +
        '</td>' +
      '</tr>';
  });

  document.getElementById('tableBody').innerHTML = rows.join('');

  // Update sort header indicators
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
  });
}

function toggleRow(i, row) {
  const dp = document.getElementById('dp-' + i);
  if (!dp) return;
  const open = dp.classList.toggle('open');
  row.classList.toggle('row-open', open);
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir = -sortDir; }
    else { sortCol = col; sortDir = (col === 'acv' || col === 'stage' || col === 'recent') ? -1 : 1; }
    renderTable();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderTable();
});

document.getElementById('filterBtns').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderTable();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
renderSummary();
renderTable();
</script>
</body>
</html>
